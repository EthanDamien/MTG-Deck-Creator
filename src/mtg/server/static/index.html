<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MTG Deck Builder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    color: #e8e8e8;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 18px 24px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 12px;
    background: #111;
    flex-shrink: 0;
  }

  header h1 { font-size: 1.3rem; letter-spacing: 0.04em; color: #c89b3c; }

  .main {
    display: flex;
    flex: 1;
    min-height: 0;
    height: calc(100vh - 57px);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid #1e1e1e;
    background: #0c0c0c;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #555;
    border-bottom: 1px solid #1e1e1e;
    flex-shrink: 0;
  }

  .sidebar-list { overflow-y: auto; flex: 1; }

  .sidebar-item {
    padding: 12px 16px;
    border-bottom: 1px solid #161616;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 2px solid transparent;
  }

  .sidebar-item:hover { background: #141414; }
  .sidebar-item.active { background: #1a1a1a; border-left-color: #c89b3c; }

  .sidebar-item .si-query {
    font-size: 0.8rem;
    color: #ccc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-item .si-meta { font-size: 0.68rem; color: #555; margin-top: 3px; }

  .sidebar-empty { padding: 24px 16px; font-size: 0.78rem; color: #444; text-align: center; }

  /* ── Content ── */
  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .build-form {
    display: flex;
    gap: 10px;
    padding: 18px 24px;
    background: #111;
    border-bottom: 1px solid #1e1e1e;
    flex-shrink: 0;
  }

  .build-form input {
    flex: 1;
    padding: 10px 14px;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 7px;
    color: #e8e8e8;
    font-size: 0.95rem;
  }

  .build-form input:focus { outline: none; border-color: #c89b3c; }

  .build-form button {
    padding: 10px 24px;
    background: #c89b3c;
    color: #0f0f0f;
    font-weight: 700;
    font-size: 0.95rem;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .build-form button:hover { background: #dbb84f; }
  .build-form button:disabled { background: #444; cursor: not-allowed; }

  #status {
    padding: 7px 24px;
    font-size: 0.8rem;
    color: #666;
    min-height: 32px;
    flex-shrink: 0;
  }

  #status.error { color: #e05252; }

  .deck-wrapper { flex: 1; overflow-y: auto; padding: 16px 24px 48px; }

  .deck-meta {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1e1e1e;
    margin-bottom: 20px;
  }

  .deck-meta h2 { font-size: 1rem; color: #c89b3c; }
  .deck-meta span { font-size: 0.8rem; color: #555; }

  .slots-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
  }

  .slot-section h3 {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
    margin-bottom: 10px;
    padding-bottom: 5px;
    border-bottom: 1px solid #1e1e1e;
  }

  .card-list { display: flex; flex-direction: column; gap: 6px; }

  .card-item {
    display: flex;
    align-items: center;
    gap: 9px;
    background: #161616;
    border-radius: 7px;
    padding: 7px;
    border: 1px solid #202020;
    cursor: pointer;
    transition: border-color 0.12s;
  }

  .card-item:hover { border-color: #383838; }

  .card-thumb {
    width: 38px; height: 53px;
    border-radius: 3px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .card-thumb-placeholder {
    width: 38px; height: 53px;
    border-radius: 3px;
    background: #222;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    color: #444;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-name {
    font-size: 0.8rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-reason {
    font-size: 0.68rem;
    color: #555;
    margin-top: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .overlay.active { display: flex; }

  .overlay img {
    max-height: 90vh;
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(0,0,0,0.9);
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #333;
    border-top-color: #c89b3c;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>⚔ MTG Deck Builder</h1>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Past Decks</div>
    <div class="sidebar-list" id="sidebarList">
      <div class="sidebar-empty">No decks yet</div>
    </div>
  </div>

  <div class="content">
    <div class="build-form">
      <input id="query" type="text"
        placeholder="e.g. Mono-green stompy commander with Ghalta"
        value="Mono-green stompy commander with Ghalta" />
      <button id="buildBtn" onclick="buildDeck()">Build Deck</button>
    </div>
    <div id="status"></div>
    <div class="deck-wrapper" id="deckWrapper"></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeOverlay()">
  <img id="overlayImg" src="" alt="" />
</div>

<script>
const SLOT_ORDER = ['commander','theme','ramp','draw','removal','wipes','protection','lands'];
let _pastDecks = [];
let _activeId = null;

async function loadPastDecks() {
  try {
    const res = await fetch('/api/decks');
    _pastDecks = await res.json();
    renderSidebar();
    if (_pastDecks.length) showDeck(_pastDecks[0].id);
  } catch (e) { console.warn('Could not load past decks', e); }
}

function renderSidebar() {
  const list = document.getElementById('sidebarList');
  if (!_pastDecks.length) {
    list.innerHTML = '<div class="sidebar-empty">No decks yet</div>';
    return;
  }
  list.innerHTML = _pastDecks.map(d => `
    <div class="sidebar-item${d.id === _activeId ? ' active' : ''}" onclick="showDeck(${d.id})">
      <div class="si-query">${escHtml(d.query)}</div>
      <div class="si-meta">${d.picks.length} cards &middot; ${fmtDate(d.created_at)}</div>
    </div>
  `).join('');
}

function showDeck(id) {
  const deck = _pastDecks.find(d => d.id === id);
  if (!deck) return;
  _activeId = id;
  renderSidebar();
  document.getElementById('query').value = deck.query;
  document.getElementById('status').textContent = `${deck.picks.length} cards`;
  renderDeck({ deck: deck.picks }, deck.query);
}

async function buildDeck() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;
  const btn = document.getElementById('buildBtn');
  const status = document.getElementById('status');
  const wrapper = document.getElementById('deckWrapper');

  btn.disabled = true;
  status.className = '';
  status.innerHTML = '<span class="spinner"></span>Building… ~30s';
  wrapper.innerHTML = '';

  try {
    const res = await fetch('/api/build', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || 'Server error');
    }
    const data = await res.json();
    _pastDecks.unshift({ id: data.id, query, created_at: data.created_at, picks: data.deck, plan: data.plan, issues: data.issues });
    _activeId = data.id;
    renderSidebar();
    renderDeck(data, query);
    status.textContent = `Done — ${data.deck.length} cards`;
  } catch (e) {
    status.className = 'error';
    status.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

function renderDeck(data, query) {
  const wrapper = document.getElementById('deckWrapper');
  wrapper.innerHTML = '';

  const bySlot = {};
  for (const pick of data.deck) {
    const slot = pick.slot || 'other';
    if (!bySlot[slot]) bySlot[slot] = [];
    bySlot[slot].push(pick);
  }

  for (const slot of Object.keys(bySlot)) {
    const seen = new Set();
    bySlot[slot] = bySlot[slot].filter(p => { if (seen.has(p.card)) return false; seen.add(p.card); return true; });
  }

  const orderedSlots = [
    ...SLOT_ORDER.filter(s => bySlot[s]),
    ...Object.keys(bySlot).filter(s => !SLOT_ORDER.includes(s)),
  ];

  const meta = document.createElement('div');
  meta.className = 'deck-meta';
  meta.innerHTML = `<h2>${escHtml(query || '')}</h2><span>${data.deck.length} cards &middot; ${orderedSlots.length} slots</span>`;
  wrapper.appendChild(meta);

  const grid = document.createElement('div');
  grid.className = 'slots-grid';

  for (const slot of orderedSlots) {
    const picks = bySlot[slot];
    const section = document.createElement('div');
    section.className = 'slot-section';
    section.innerHTML = `<h3>${escHtml(slot)} <span style="color:#444">(${picks.length})</span></h3>`;
    const list = document.createElement('div');
    list.className = 'card-list';

    for (const pick of picks) {
      const item = document.createElement('div');
      item.className = 'card-item';
      item.onclick = () => openOverlay(pick.image_uri);
      const thumb = pick.image_uri
        ? `<img class="card-thumb" src="${escHtml(pick.image_uri)}" alt="${escHtml(pick.card)}" loading="lazy" />`
        : `<div class="card-thumb-placeholder">no img</div>`;
      item.innerHTML = `${thumb}<div class="card-info"><div class="card-name">${escHtml(pick.card)}</div><div class="card-reason">${escHtml(pick.reason || '')}</div></div>`;
      list.appendChild(item);
    }

    section.appendChild(list);
    grid.appendChild(section);
  }
  wrapper.appendChild(grid);
}

function openOverlay(uri) {
  if (!uri) return;
  document.getElementById('overlayImg').src = uri;
  document.getElementById('overlay').classList.add('active');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('active'); }

document.getElementById('query').addEventListener('keydown', e => { if (e.key === 'Enter') buildDeck(); });

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadPastDecks();
</script>
</body>
</html>
